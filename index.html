<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاتم للكهرباء</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body {
    background: #0a0a0a;
    color: white;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 15px 20px;
    background: black;
}

.logo {
    color: #ffcc00;
    font-size: 22px;
    font-weight: bold;
}

/* HERO */
.hero {
    height: 350px;
    background: url('https://images.unsplash.com/photo-1581090700227-1e37b190418e') center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

.hero h1 {
    background: rgba(0,0,0,0.6);
    padding: 20px;
    animation: fadeIn 2s ease;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(30px);}
    to {opacity: 1; transform: translateY(0);}
}

/* SECTION */
.section {
    padding: 40px 20px;
    text-align: center;
}

/* SERVICES */
.services {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

.card {
    flex: 1 1 200px;
    background: #111;
    padding: 20px;
    border-radius: 15px;
    transition: 0.3s;
    border: 1px solid #222;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 15px #ffcc00;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 20px;
    background: #ffcc00;
    color: black;
    border-radius: 5px;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    background: white;
}

/* GALLERY */
.gallery img {
    width: 100%;
    border-radius: 10px;
    margin-top: 10px;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    padding: 15px;
    border-radius: 50%;
}

/* FOOTER */
footer {
    background: black;
    text-align: center;
    padding: 15px;
    margin-top: 30px;
}
</style>

</head>

<body>

<header>
<div class="logo">⚡ حاتم للكهرباء</div>
</header>

<div class="hero">
<h1>كهرباء احترافية في طنجة ⚡<br>خدمة سريعة وآمنة</h1>
</div>

<div class="section">
<h2>🔧 خدماتنا</h2>
<div class="services">

<div class="card">
<h3>تركيب الكهرباء</h3>
<p>تركيب احترافي لجميع الأنظمة</p>
<a class="btn" href="#">اطلب الآن</a>
</div>

<div class="card">
<h3>إصلاح الأعطال</h3>
<p>حل سريع لجميع المشاكل</p>
<a class="btn" href="#">اطلب الآن</a>
</div>

<div class="card">
<h3>كاميرات المراقبة</h3>
<p>حماية منزلك بأفضل جودة</p>
<a class="btn" href="#">اطلب الآن</a>
</div>

</div>
</div>

<div class="section">
<h2>📸 أعمالي</h2>
<div class="gallery">
<img src="https://i.ibb.co/nNQGcBhD/IMG-6587.jpg">
<img src="https://i.ibb.co/QjCNg1r5/IMG-6210.jpg">
</div>
</div>

<a class="whatsapp" href="https://wa.me/212694760224">💬</a>

<footer>
© حاتم للكهرباء 2026
</footer>

</body>
</html>
