<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* HEADER */
header {
    background: #111;
    color: white;
    padding: 15px;
    text-align: center;
}

header h1 {
    margin: 0;
    color: #00d4ff;
}

/* HERO */
.hero {
    height: 90vh;
    background: url('https://i.ibb.co/bMPKmFZV/IMG-8351.jpg') no-repeat center/cover;
    display: flex;
    align-items: center;
    justify-content: center;

}

.hero h2 {

    padding: 20px;
    border-radius: 10px;
}

/* SERVICES */
.services {
    padding: 40px;
    text-align: center;
}

.services h2 {
    margin-bottom: 30px;
}

.cards {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
}

.card {
    width: 300px;
    background: #f5f5f5;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card h3 {
    padding: 10px;
}

/* FOOTER */
footer {
    background: #111;
    color: white;
    text-align: center;
    padding: 15px;
}

</style>
