<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاتم للكهرباء</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
}

/* HEADER */
header {
    padding: 15px;
    text-align: center;
    color: red;
    text-shadow: 0 0 10px red;
}

/* HERO */
.hero {
    height: 300px;
    background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)),
    url('رابط_الصورة_ديالك') center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* TYPING */
.typing {
    color: red;
    font-size: 22px;
    border-right: 2px solid red;
    white-space: nowrap;
    overflow: hidden;
    width: 0;
    animation: typing 4s steps(30) forwards, blink 0.7s infinite;
}

@keyframes typing {
    from { width: 0 }
    to { width: 100% }
}

@keyframes blink {
    50% { border-color: transparent }
}

/* SECTION */
.section {
    padding: 30px;
    text-align: center;
}

/* CARDS */
.card {
    background: #111;
    padding: 15px;
    margin-top: 10px;
    border: 1px solid red;
    border-radius: 10px;
}

/* REVIEWS */
.review {
    background: #111;
    margin-top: 10px;
    padding: 10px;
    border-left: 3px solid red;
}

/* FORM */
input, textarea {
    width: 90%;
    padding: 10px;
    margin-top: 10px;
    background: #111;
    border: 1px solid red;
    color: white;
}

button {
    margin-top: 10px;
    padding: 10px;
    background: red;
    color: white;
    border: none;
}

/* MAP */
iframe {
    width: 100%;
    height: 250px;
    margin-top: 10px;
    border: none;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    padding: 15px;
    border-radius: 50%;
}
</style>

</head>

<body>

<header>⚡ حاتم للكهرباء ⚡</header>

<div class="hero">
<div class="typing">كهرباء احترافية في طنجة ⚡</div>
</div>

<div class="section">
<h2>🔧 خدماتنا</h2>
<div class="card">تركيب الكهرباء</div>
<div class="card">إصلاح الأعطال</div>
<div class="card">كاميرات المراقبة</div>
</div>

<div class="section">
<h2>⭐ آراء الزبناء</h2>
<div class="review">خدمة ممتازة 👍</div>
<div class="review">سريع و محترف 👌</div>
</div>

<div class="section">
<h2>📍 موقعنا</h2>
<iframe src="https://maps.google.com/maps?q=tanger&output=embed"></iframe>
</div>

<div class="section">
<h2>📩 تواصل معنا</h2>
<form action="mailto:your@email.com" method="post" enctype="text/plain">
<input type="text" placeholder="الاسم" required><br>
<input type="tel" placeholder="الهاتف" required><br>
<textarea placeholder="الرسالة"></textarea><br>
<button type="submit">إرسال</button>
</form>
</div>

<a class="whatsapp" href="https://wa.me/212XXXXXXXXX">💬</a>

</body>
</html>
