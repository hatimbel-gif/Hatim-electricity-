<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاتم للكهرباء</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #000;
    color: white;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: black;
    border-bottom: 1px solid red;
}

.logo {
    color: red;
    font-weight: bold;
    text-shadow: 0 0 10px red;
}

/* HERO */
.hero {
    height: 350px;
    background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)),
    url https://i.ibb.co/bMPKmFZV/IMG-8351.jpgcenter/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero h1 {
    color: red;
    text-shadow: 0 0 20px red;
    animation: glow 2s infinite alternate;
}

/* GLOW ANIMATION */
@keyframes glow {
    from { text-shadow: 0 0 10px red; }
    to { text-shadow: 0 0 25px red; }
}

/* SECTION */
.section {
    padding: 40px 20px;
    text-align: center;
}

/* CARDS */
.card {
    background: #111;
    padding: 20px;
    margin-top: 15px;
    border-radius: 10px;
    border: 1px solid red;
    transition: 0.3s;
}

.card:hover {
    box-shadow: 0 0 20px red;
    transform: scale(1.05);
}

/* BUTTON */
.btn {
    background: red;
    color: white;
    padding: 10px 20px;
    display: inline-block;
    margin-top: 10px;
    text-decoration: none;
    border-radius: 5px;
    box-shadow: 0 0 10px red;
    transition: 0.3s;
}

.btn:hover {
    background: black;
    color: red;
    border: 1px solid red;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    padding: 15px;
    border-radius: 50%;
}
</style>

</head>

<body>

<header>
<div class="logo">⚡ حاتم للكهرباء</div>
</header>

<div class="hero">
<h1>كهرباء احترافية ⚡<br>خدمة قوية وسريعة</h1>
</div>

<div class="section">
<h2>🔧 خدماتنا</h2>

<div class="card">تركيب الكهرباء</div>
<div class="card">إصلاح الأعطال</div>
<div class="card">كاميرات المراقبة</div>

</div>

<div class="section">
<h2>📞 تواصل</h2>
<a class="btn" href="https://wa.me/212XXXXXXXXX">واتساب</a>
</div>

<a class="whatsapp" href="https://wa.me/212XXXXXXXXX">💬</a>

</body>
</html>
